service_accounts:
  - name: sa-ci-cd-pipeline
    display_name: CI/CD Pipeline Service Account
    description: Used by CI/CD pipelines for automated deployments
    role: ci-cd-deployer
    allowed_projects: ["*"]
    key_rotation_days: 90
    status: active

  - name: sa-monitoring-agent
    display_name: Monitoring Agent Service Account
    description: Used by monitoring agents to collect metrics
    role: monitoring-viewer
    allowed_projects: ["*"]
    key_rotation_days: 90
    status: active

  - name: sa-backup-agent
    display_name: Backup Agent Service Account
    description: Used by backup service for automated backups
    role: storage-admin
    allowed_projects: ["*"]
    key_rotation_days: 90
    status: active

  - name: sa-terraform
    display_name: Terraform Service Account
    description: Used by Terraform for infrastructure management
    role: admin
    allowed_projects: ["infra-*"]
    key_rotation_days: 30
    ip_restrictions: ["10.0.0.0/8"]
    status: active

  - name: sa-vulnerability-scanner
    display_name: Vulnerability Scanner Service Account
    description: Used by vulnerability scanning tools
    role: viewer
    allowed_projects: ["*"]
    key_rotation_days: 90
    status: active
