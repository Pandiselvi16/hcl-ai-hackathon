template:
  name: vm-small
  description: Small VM deployment template
  version: "1.0.0"
  category: compute
  parameters:
    instance_type: gp-small-v1
    os_image: ubuntu-24.04
    storage:
      root_volume:
        size_gb: 50
        type: standard-ssd
    networking:
      vpc: default
      subnet: private
      security_group: sg-app-private
      public_ip: false
    tags:
      environment: ""
      team: ""
      project: ""
  monitoring:
    enabled: true
    metrics: ["cpu", "memory", "disk", "network"]
    alert_profile: default
  backup:
    enabled: true
    schedule: daily
    retention_days: 7
  status: active
