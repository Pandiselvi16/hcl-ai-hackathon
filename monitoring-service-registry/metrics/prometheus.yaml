provider: prometheus
description: Prometheus-based metrics collection and alerting
version: "2.50.0"
status: active
scrape_configs:
  - job_name: node-exporter
    scrape_interval: 15s
    metrics_path: /metrics
    port: 9100
    labels:
      tier: infrastructure

  - job_name: kube-state-metrics
    scrape_interval: 30s
    metrics_path: /metrics
    port: 8080
    labels:
      tier: kubernetes

  - job_name: cadvisor
    scrape_interval: 15s
    metrics_path: /metrics
    port: 8080
    labels:
      tier: container

  - job_name: application-metrics
    scrape_interval: 30s
    metrics_path: /metrics
    port: 8090
    labels:
      tier: application

retention:
  raw_data_days: 15
  downsampled_5m_days: 90
  downsampled_1h_days: 365

storage:
  type: thanos
  bucket: monitoring-metrics-bucket
  compaction_enabled: true
