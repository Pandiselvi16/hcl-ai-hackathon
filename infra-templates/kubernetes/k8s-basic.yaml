template:
  name: k8s-basic
  description: Basic Kubernetes cluster for development
  version: "1.0.0"
  category: kubernetes
  parameters:
    k8s_version: "1.51"
    control_plane:
      instance_type: gp-medium-v1
      count: 1
    worker_nodes:
      instance_type: gp-medium-v1
      min_count: 2
      max_count: 5
      auto_scaling: true
    networking:
      vpc: default
      pod_cidr: "10.244.0.0/16"
      service_cidr: "10.96.0.0/12"
      cni: calico
    addons:
      - nginx-ingress
      - cert-manager
      - prometheus-stack
    storage:
      default_storage_class: standard-ssd
  monitoring:
    enabled: true
    alert_profile: k8s-default
  status: active
